<!DOCTYPE html>
<html>
<head>
    <title>Simple Multi Page Website</title>
</head>

<body>

    <h1>My Website</h1>

    <!-- Navigation Menu -->
    <a href="#home">Home</a> |
    <a href="#about">About</a> |
    <a href="#services">Services</a> |
    <a href="#contact">Contact</a>

    <hr>

    <!-- Home Section -->
    <section id="home">
        <h2>Home</h2>
        <p>Welcome to my simple website.</p>
    </section>

    <hr>

    <!-- About Section -->
    <section id="about">
        <h2>About</h2>
        <p>This website is created using HTML only.</p>
    </section>

    <hr>

    <!-- Services Section -->
    <section id="services">
        <h2>Services</h2>
        <ul>
            <li>Web Design</li>
            <li>HTML Projects</li>
            <li>JavaScript Projects</li>
        </ul>
    </section>

    <hr>

    <!-- Contact Section -->
    <section id="contact">
        <h2>Contact</h2>

        <form>
            Name:<br>
            <input type="text"><br><br>

            Email:<br>
            <input type="email"><br><br>

            Message:<br>
            <textarea rows="4" cols="30"></textarea><br><br>

            <input type="submit" value="Send">
        </form>
    </section>

</body>
</html>
